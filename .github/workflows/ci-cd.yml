name: CI/CD Pipeline

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    # GitHub only exposes secrets that exist; empty = wrong name or Variable vs Secret.
    env:
      DOCKERHUB_USER: ${{ secrets.DOCKER_USERNAME || secrets.DOCKERHUB_USERNAME || secrets.DOCKER_HUB_USERNAME }}

    steps:
      - name: Verify Docker Hub secrets
        env:
          DH_USER: ${{ env.DOCKERHUB_USER }}
          DH_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          if [ -z "${DH_USER// }" ]; then
            echo "::error::Docker username is empty. Add repository secret DOCKER_USERNAME (or DOCKERHUB_USERNAME) under Settings → Secrets and variables → Actions. If you only added a Repository variable, switch it to a Secret — this workflow reads secrets.* only."
            exit 1
          fi
          if [ -z "${DH_TOKEN// }" ]; then
            echo "::error::DOCKERHUB_TOKEN is missing or empty. Create an Access Token on Docker Hub (Account → Security) and add it as secret DOCKERHUB_TOKEN."
            exit 1
          fi

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Build JAR with Maven
        run: chmod +x mvnw && ./mvnw -B clean package -DskipTests

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKERHUB_USER }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ env.DOCKERHUB_USER }}/springboot-aws-cicd-pipeline:latest
            ${{ env.DOCKERHUB_USER }}/springboot-aws-cicd-pipeline:${{ github.sha }}

      - name: SSH and Deploy to EC2
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script_stop: true
          script: |
            docker login -u "${{ env.DOCKERHUB_USER }}" -p "${{ secrets.DOCKERHUB_TOKEN }}"
            docker stop spring-demo || true
            docker rm spring-demo || true
            docker pull ${{ env.DOCKERHUB_USER }}/springboot-aws-cicd-pipeline:latest
            docker run -d --name spring-demo --restart unless-stopped -p 8080:8080 ${{ env.DOCKERHUB_USER }}/springboot-aws-cicd-pipeline:latest
